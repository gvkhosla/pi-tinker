name: I got stuck
description: Something in the pi-tinker flow was confusing or did not work
labels: [needs-triage, onboarding]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying pi-tinker. Please paste the command you ran and `/tinker doctor` output so we can quickly see where the flow broke.
  - type: input
    id: command
    attributes:
      label: Command you ran
      placeholder: /tinker new data.csv --goal "better support answers"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: /tinker doctor output
      description: Run `/tinker doctor` and paste the output here.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
